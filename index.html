<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>键皮匠 · 输入法皮肤编辑器</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Long+Cang&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0e131c;
    --panel: #131a26;
    --panel-2: #1a2230;
    --border: #232d3f;
    --border-2: #2e3a52;
    --fg: #e8edf5;
    --muted: #6b7689;
    --muted-2: #8d97aa;
    --accent: #00ffa3;
    --accent-2: #00d9ff;
    --accent-3: #ff5d8f;
    --warn: #ffb547;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 600px at 12% 8%, rgba(0,255,163,0.10), transparent 60%),
      radial-gradient(900px 700px at 95% 90%, rgba(0,217,255,0.08), transparent 60%),
      radial-gradient(600px 400px at 50% 50%, rgba(255,93,143,0.04), transparent 70%),
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px) 0 0 / 36px 36px,
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px) 0 0 / 36px 36px;
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }
  
  /* Header */
  header {
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,9,13,0.7);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    color: #001a14;
    font-weight: 900;
    font-size: 18px;
    box-shadow: 0 0 24px rgba(0,255,163,0.35);
  }
  .logo h1 { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: 0.5px; }
  .logo p { font-size: 11px; color: var(--muted); margin: 0; font-family: 'JetBrains Mono'; letter-spacing: 1px; }
  
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border-2);
    background: var(--panel-2);
    color: var(--fg);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none;
    color: #001a14;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(0,255,163,0.25);
  }
  .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,255,163,0.4); color: #001a14; }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--accent-3); border-color: rgba(255,93,143,0.3); }
  .btn.danger:hover { background: rgba(255,93,143,0.1); border-color: var(--accent-3); color: var(--accent-3); }
  
  /* Main */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 460px;
    overflow: hidden;
  }
  
  /* Preview area */
  .preview-area {
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    overflow: auto;
    position: relative;
  }
  .preview-bg-text {
    position: absolute;
    font-family: 'JetBrains Mono';
    font-size: 200px;
    font-weight: 900;
    color: rgba(255,255,255,0.015);
    pointer-events: none;
    user-select: none;
    letter-spacing: -8px;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    white-space: nowrap;
  }
  
  .phone-frame {
    width: 380px;
    height: 760px;
    background: #000;
    border-radius: 48px;
    padding: 12px;
    border: 2px solid #1f2530;
    box-shadow: 
      0 0 0 8px #0a0e14,
      0 30px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(0,255,163,0.05);
    position: relative;
    flex-shrink: 0;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #000;
    border-radius: 14px;
    z-index: 10;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a1f2e 0%, #0f1420 100%);
    border-radius: 38px;
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  
  /* Status bar */
  .status-bar {
    height: 44px;
    padding: 14px 28px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .status-right { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  
  /* App content area (mock) */
  .mock-app {
    flex: 1;
    padding: 24px 20px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .mock-title {
    font-size: 22px; font-weight: 700; margin-bottom: 16px; color: #fff;
  }
  .mock-input-wrap {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    min-height: 60px;
    color: #fff;
    font-size: 16px;
    line-height: 1.5;
    word-break: break-all;
  }
  .mock-input-wrap:empty::before {
    content: '点击下方键盘开始输入...';
    color: rgba(255,255,255,0.3);
  }
  .mock-cursor {
    display: inline-block;
    width: 2px; height: 18px;
    background: var(--accent);
    animation: blink 1s steps(2) infinite;
    vertical-align: middle;
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  
  /* Candidate bar */
  .candidate-bar {
    height: 40px;
    background: var(--kbd-bg, #1a1f2e);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 14px;
    overflow: hidden;
    flex-shrink: 0;
    color: var(--kbd-fg, #e8edf5);
    font-family: var(--kbd-font, 'Space Grotesk');
  }
  .candidate-bar .brand {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
